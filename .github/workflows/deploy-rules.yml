name: Desplegar reglas de Firestore

on:
  push:
    branches: [main]
    paths: ['firestore.rules', 'firebase.json']
  workflow_dispatch:

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Desplegar reglas
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          npx -y firebase-tools deploy --only firestore:rules --project porra-mundial-8f63e --non-interactive
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
